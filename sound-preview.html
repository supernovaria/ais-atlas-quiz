<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sound Preview Lab вЂ” AIS Atlas Quiz</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #0f1117;
  color: #e0e0e0;
  padding: 2rem;
  line-height: 1.5;
  max-width: 900px;
}
h1 {
  font-size: 1.6rem;
  margin-bottom: 0.3rem;
  color: #fff;
}
.subtitle {
  color: #777;
  margin-bottom: 2.5rem;
  font-size: 0.9rem;
}
section {
  margin-bottom: 2.8rem;
}
h2 {
  font-size: 1rem;
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid #2a2a2a;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  font-size: 0.85rem;
}
.success-section h2 { color: #56d98e; }
.mistake-section h2 { color: #d97b56; }
.score-section h2   { color: #56a8d9; }

.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 0.55rem;
}

button {
  padding: 0.5rem 1rem;
  border: none;
  border-radius: 6px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: transform 0.07s, filter 0.07s;
  font-family: inherit;
  font-weight: 500;
  letter-spacing: 0.01em;
}
button:hover { filter: brightness(1.2); }
button:active { transform: scale(0.94); }

.success-section button {
  background: #193328;
  color: #56d98e;
  border: 1px solid #2a5240;
}
.mistake-section button {
  background: #33201a;
  color: #d97b56;
  border: 1px solid #52392a;
}
.score-section button {
  background: #182633;
  color: #56a8d9;
  border: 1px solid #2a4a62;
}
</style>
</head>
<body>
<h1>Sound Preview Lab</h1>
<p class="subtitle">Click buttons to preview sounds. Tell me the labels of the ones you like best from each group.</p>

<section class="success-section">
  <h2>вњ“ Success Tones вЂ” correct answer</h2>
  <div class="grid" id="success-grid"></div>
</section>

<section class="mistake-section">
  <h2>вњ— Mistake Tones вЂ” wrong answer</h2>
  <div class="grid" id="mistake-grid"></div>
</section>

<section class="score-section">
  <h2>% Score Reveal Tones вЂ” end of quiz</h2>
  <div class="grid" id="score-grid"></div>
</section>

<script>
// в”Ђв”Ђ Audio context в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
let _ctx = null;
function ac() {
  if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (_ctx.state === 'suspended') _ctx.resume();
  return _ctx;
}

// в”Ђв”Ђ Low-level helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

// Play a single oscillator note with an exponential decay envelope
function note({ freq, type = 'sine', vol = 0.22, decay = 6, start = 0 }) {
  const c = ac(), now = c.currentTime + start;
  const dur = 6 / decay;
  const osc = c.createOscillator();
  const gain = c.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, now);
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(vol, now + 0.006);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  osc.connect(gain); gain.connect(c.destination);
  osc.start(now); osc.stop(now + dur + 0.05);
}

// Play a frequency sweep (pitch glide)
function sweep({ f0, f1, type = 'sine', vol = 0.25, dur = 0.3, start = 0 }) {
  const c = ac(), now = c.currentTime + start;
  const osc = c.createOscillator();
  const gain = c.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(f0, now);
  osc.frequency.exponentialRampToValueAtTime(f1, now + dur);
  gain.gain.setValueAtTime(vol, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  osc.connect(gain); gain.connect(c.destination);
  osc.start(now); osc.stop(now + dur + 0.05);
}

// Play noise burst (for drum-roll feel)
function noise({ vol = 0.15, dur = 0.12, start = 0, cutoff = 1200 }) {
  const c = ac(), now = c.currentTime + start;
  const buf = c.createBuffer(1, Math.ceil(c.sampleRate * dur), c.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = c.createBufferSource();
  const filt = c.createBiquadFilter();
  const gain = c.createGain();
  filt.type = 'lowpass'; filt.frequency.value = cutoff;
  src.buffer = buf;
  gain.gain.setValueAtTime(vol, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  src.connect(filt); filt.connect(gain); gain.connect(c.destination);
  src.start(now); src.stop(now + dur + 0.02);
}

// Play a chord (multiple notes at once)
function chord(freqs, { type = 'sine', vol = 0.15, decay = 3, start = 0 } = {}) {
  freqs.forEach(f => note({ freq: f, type, vol, decay, start }));
}

// в”Ђв”Ђ 10 SUCCESS tones в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const successSounds = [
  {
    label: 'S1 В· Chime-Up',
    play() {
      // Ascending D5в†’G5в†’C6, classic bell-chime
      note({ freq: 587.3, decay: 8, start: 0 });
      note({ freq: 784.0, decay: 8, start: 0.06 });
      note({ freq: 1046.5, decay: 8, start: 0.12 });
    }
  },
  {
    label: 'S2 В· Sparkle',
    play() {
      // 5-note rapid sparkle C5в†’E5в†’G5в†’B5в†’E6
      [523.3, 659.3, 784.0, 987.8, 1318.5].forEach((f, i) =>
        note({ freq: f, decay: 14, vol: 0.18, start: i * 0.04 })
      );
    }
  },
  {
    label: 'S3 В· Bell-Duo',
    play() {
      // E5 + C6 together, long bell ring
      note({ freq: 659.3, decay: 2.5, vol: 0.2, start: 0 });
      note({ freq: 1046.5, decay: 2.5, vol: 0.16, start: 0 });
    }
  },
  {
    label: 'S4 В· Fanfare',
    play() {
      // G4в†’C5в†’E5в†’G5 mini fanfare, triangle wave
      [392, 523.3, 659.3, 784].forEach((f, i) =>
        note({ freq: f, type: 'triangle', decay: 7, vol: 0.2, start: i * 0.08 })
      );
    }
  },
  {
    label: 'S5 В· Boing-Up',
    play() {
      // Upward pitch sweep (200в†’1400 Hz)
      sweep({ f0: 200, f1: 1400, dur: 0.32, vol: 0.22 });
    }
  },
  {
    label: 'S6 В· Marimba',
    play() {
      // C5в†’E5в†’G5 staccato marimba feel, triangle + fast decay
      note({ freq: 523.3, type: 'triangle', decay: 11, vol: 0.24, start: 0 });
      note({ freq: 659.3, type: 'triangle', decay: 11, vol: 0.24, start: 0.055 });
      note({ freq: 784.0, type: 'triangle', decay: 11, vol: 0.24, start: 0.11 });
    }
  },
  {
    label: 'S7 В· Pixel-Win',
    play() {
      // 8-bit square wave ascending C5в†’E5в†’G5в†’C6
      [523.3, 659.3, 784.0, 1046.5].forEach((f, i) =>
        note({ freq: f, type: 'square', decay: 12, vol: 0.09, start: i * 0.038 })
      );
    }
  },
  {
    label: 'S8 В· Warm-Chord',
    play() {
      // C4+E4+G4+C5 warm sine chord
      chord([261.6, 329.6, 392.0, 523.3], { decay: 2, vol: 0.16 });
    }
  },
  {
    label: 'S9 В· Ping-Ping',
    play() {
      // Two quick high pings G5 then C6
      note({ freq: 784.0, decay: 14, vol: 0.2, start: 0 });
      note({ freq: 1046.5, decay: 14, vol: 0.2, start: 0.13 });
    }
  },
  {
    label: 'S10 В· Xylo-Roll',
    play() {
      // C5в†’E5в†’G5в†’A5в†’C6, xylophone roll
      [523.3, 659.3, 784.0, 880.0, 1046.5].forEach((f, i) =>
        note({ freq: f, type: 'triangle', decay: 10, vol: 0.2, start: i * 0.048 })
      );
    }
  },
];

// в”Ђв”Ђ 10 MISTAKE tones в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const mistakeSounds = [
  {
    label: 'M1 В· Thonk',
    play() {
      // Pitch-swept sine 280в†’100 Hz, short вЂ” the current quiz sound
      sweep({ f0: 280, f1: 100, dur: 0.22, vol: 0.28 });
    }
  },
  {
    label: 'M2 В· Wah-Down',
    play() {
      // Slower descending sweep 400в†’130 Hz, triangle
      sweep({ f0: 400, f1: 130, type: 'triangle', dur: 0.35, vol: 0.2 });
    }
  },
  {
    label: 'M3 В· Low-Buzz',
    play() {
      // Short low buzz at 90 Hz, sawtooth
      note({ freq: 90, type: 'sawtooth', decay: 14, vol: 0.1, start: 0 });
    }
  },
  {
    label: 'M4 В· Hollow-Knock',
    play() {
      // 200 Hz fundamental + 400 Hz overtone, hollow body sound
      note({ freq: 200, decay: 10, vol: 0.22, start: 0 });
      note({ freq: 400, decay: 15, vol: 0.08, start: 0 });
    }
  },
  {
    label: 'M5 В· Sad-Slide',
    play() {
      // Sine glide from 520в†’200 Hz over 0.3s
      sweep({ f0: 520, f1: 200, dur: 0.3, vol: 0.22 });
    }
  },
  {
    label: 'M6 В· Low-Blip',
    play() {
      // Quick low-pitched sine blip at 160 Hz
      note({ freq: 160, decay: 18, vol: 0.24, start: 0 });
    }
  },
  {
    label: 'M7 В· Clunk',
    play() {
      // Noise burst + low 70 Hz sine together
      noise({ vol: 0.12, dur: 0.1, cutoff: 500 });
      note({ freq: 70, decay: 12, vol: 0.2, start: 0 });
    }
  },
  {
    label: 'M8 В· Muted-Wah',
    play() {
      // Slow descending sweep 350в†’90 Hz, soft
      sweep({ f0: 350, f1: 90, dur: 0.4, vol: 0.18 });
    }
  },
  {
    label: 'M9 В· Soft-Thud',
    play() {
      // Deep 60 Hz sine thud, soft
      note({ freq: 60, decay: 9, vol: 0.25, start: 0 });
    }
  },
  {
    label: 'M10 В· Down-Arp',
    play() {
      // Descending E4в†’C4в†’G3, sad arpeggio
      note({ freq: 329.6, decay: 9, vol: 0.2, start: 0 });
      note({ freq: 261.6, decay: 9, vol: 0.2, start: 0.07 });
      note({ freq: 196.0, decay: 9, vol: 0.2, start: 0.14 });
    }
  },
];

// в”Ђв”Ђ 10 SCORE REVEAL tones в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const scoreSounds = [
  {
    label: 'R1 В· Count-Up',
    play() {
      // 5-note ascending scale C4в†’D4в†’E4в†’G4в†’C5
      [261.6, 293.7, 329.6, 392.0, 523.3].forEach((f, i) =>
        note({ freq: f, decay: 5, vol: 0.2, start: i * 0.09 })
      );
    }
  },
  {
    label: 'R2 В· Victory',
    play() {
      // G4в†’C5в†’E5в†’G5, triumphant triangle, longer decay
      [392.0, 523.3, 659.3, 784.0].forEach((f, i) =>
        note({ freq: f, type: 'triangle', decay: 4, vol: 0.22, start: i * 0.1 })
      );
    }
  },
  {
    label: 'R3 В· Level-Up',
    play() {
      // C5в†’D5в†’E5в†’G5в†’C6 ascending, then C6 held longer
      [523.3, 587.3, 659.3, 784.0, 1046.5].forEach((f, i) => {
        const isLast = i === 4;
        note({ freq: f, type: 'triangle', decay: isLast ? 3 : 8, vol: 0.2, start: i * 0.065 });
      });
    }
  },
  {
    label: 'R4 В· Sparkle-Burst',
    play() {
      // Rapid 6-note ascending sparkle C5в†’E5в†’G5в†’B5в†’D6в†’G6
      [523.3, 659.3, 784.0, 987.8, 1174.7, 1568.0].forEach((f, i) =>
        note({ freq: f, decay: 5, vol: 0.17, start: i * 0.042 })
      );
    }
  },
  {
    label: 'R5 В· Gentle-Rise',
    play() {
      // C4в†’E4в†’G4в†’C5 slow gentle ascent, sine, long sustain
      [261.6, 329.6, 392.0, 523.3].forEach((f, i) =>
        note({ freq: f, decay: 2, vol: 0.18, start: i * 0.14 })
      );
    }
  },
  {
    label: 'R6 В· Tada',
    play() {
      // G4+D5 chord, then G5+B5 accent 160ms later
      chord([392.0, 587.3], { type: 'triangle', decay: 5, vol: 0.18 });
      setTimeout(() => chord([784.0, 987.8], { type: 'triangle', decay: 4, vol: 0.2 }), 160);
    }
  },
  {
    label: 'R7 В· Roll-Ding',
    play() {
      // Short noise roll then D5в†’G5в†’C6 ding
      noise({ vol: 0.1, dur: 0.18, cutoff: 3000 });
      note({ freq: 587.3, decay: 8, vol: 0.18, start: 0.2 });
      note({ freq: 784.0, decay: 8, vol: 0.18, start: 0.26 });
      note({ freq: 1046.5, decay: 6, vol: 0.2, start: 0.32 });
    }
  },
  {
    label: 'R8 В· Bells-Six',
    play() {
      // 6 bells C5в†’E5в†’G5в†’C6в†’E6в†’G6
      [523.3, 659.3, 784.0, 1046.5, 1318.5, 1568.0].forEach((f, i) =>
        note({ freq: f, decay: 4, vol: 0.17, start: i * 0.075 })
      );
    }
  },
  {
    label: 'R9 В· Completion',
    play() {
      // Full C major chord C3+G3+E4+C5, all at once, slow warm fade
      chord([130.8, 196.0, 329.6, 523.3], { decay: 1.8, vol: 0.14 });
    }
  },
  {
    label: 'R10 В· Trophy',
    play() {
      // Two-phrase: E4в†’G4в†’C5в†’E5 (slow), then C5в†’E5в†’G5в†’C6 (fast) after pause
      [329.6, 392.0, 523.3, 659.3].forEach((f, i) =>
        note({ freq: f, type: 'triangle', decay: 6, vol: 0.2, start: i * 0.11 })
      );
      setTimeout(() => {
        [523.3, 659.3, 784.0, 1046.5].forEach((f, i) =>
          note({ freq: f, type: 'triangle', decay: 5, vol: 0.2, start: i * 0.055 })
        );
      }, 620);
    }
  },
];

// в”Ђв”Ђ Render buttons в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderGroup(sounds, containerId) {
  const container = document.getElementById(containerId);
  sounds.forEach(({ label, play }) => {
    const btn = document.createElement('button');
    btn.textContent = label;
    btn.addEventListener('click', () => { try { play(); } catch(e) {} });
    container.appendChild(btn);
  });
}

renderGroup(successSounds, 'success-grid');
renderGroup(mistakeSounds, 'mistake-grid');
renderGroup(scoreSounds,   'score-grid');
</script>
</body>
</html>
